<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Iron Script</title>
    <style>
        :root { 
            --bg: #000000; 
            --card: #1c1c1e; 
            --primary: #0a84ff; 
            --text: #ffffff; 
            --accent: #32d74b; 
            --input-bg: #2c2c2e; 
            --cardio: #ff9f0a; 
            --gold: #ffd700; 
            --iron: linear-gradient(145deg, #8e8e93, #48484a, #2c2c2e); 
        }
        
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 15px; margin: 0; padding-bottom: 120px; }
        
        /* AUTH THEME */
        #auth-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: radial-gradient(circle at center, #1c1c1e 0%, #000 100%); z-index: 1000; display: flex; flex-direction: column; justify-content: center; padding: 30px; box-sizing: border-box; }
        .auth-container { max-width: 400px; margin: 0 auto; width: 100%; text-align: center; }
        .main-title { font-size: 2.5rem; font-weight: 900; letter-spacing: -1px; margin-bottom: 5px; text-transform: uppercase; color: #d1d1d6; text-shadow: 2px 2px 4px rgba(0,0,0,0.8), 0 0 1px #fff; }
        .auth-input { background: var(--input-bg); border: 1px solid #444; color: white; padding: 15px; border-radius: 8px; margin-bottom: 12px; width:100%; box-sizing: border-box; font-size: 1rem; }
        .auth-btn { background: var(--iron); color: #fff; border: 1px solid #8e8e93; padding: 18px; border-radius: 4px; font-weight: 900; width:100%; cursor: pointer; font-size: 1.1rem; text-transform: uppercase; box-shadow: inset 1px 1px 2px rgba(255,255,255,0.2), 2px 2px 5px rgba(0,0,0,0.5); animation: bluePulse 3s infinite; }
        @keyframes bluePulse { 0% { box-shadow: 0 0 0 0 rgba(10, 132, 255, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(10, 132, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(10, 132, 255, 0); } }
        .auth-secondary { color: var(--primary); background: none; border: none; margin-top: 25px; width: 100%; font-size: 0.9rem; cursor: pointer; text-decoration: underline; }
        .signup-only { display: none; }
        
        /* APP STYLES */
        .header { background: var(--bg); position: sticky; top: 0; z-index: 10; padding-bottom: 10px; border-bottom: 1px solid #333; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .logout-btn { background: none; border: 1px solid #ff453a; color: #ff453a; padding: 5px 12px; border-radius: 8px; font-size: 0.75rem; font-weight: bold; }
        .top-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .stat-label { font-size: 0.6rem; color: #8e8e93; text-transform: uppercase; margin-bottom: 4px; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; border-left: 4px solid var(--primary); position: relative; }
        .card.cardio { border-left-color: var(--cardio); }
        .set-row { display: grid; grid-template-columns: 0.5fr 1.5fr 1.5fr 0.5fr; gap: 10px; margin-bottom: 10px; align-items: center; }
        input, textarea { background: var(--input-bg); border: none; color: white; padding: 10px; border-radius: 8px; font-size: 0.9rem; width: 100%; box-sizing: border-box; }
        .btn-add-ex { background: #1c1c1e; color: var(--text); border: 2px dashed #444; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; margin-bottom: 10px; }
        .save-footer { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.95); padding: 15px; display: grid; grid-template-columns: 1fr 1fr 2fr; gap: 10px; border-top: 1px solid #333; z-index: 20; }
        .panel { position: fixed; top: 100%; left: 0; width: 100%; height: 90%; background: #1c1c1e; transition: top 0.3s ease; z-index: 100; overflow-y: auto; padding: 20px; box-sizing: border-box; border-radius: 20px 20px 0 0; }
        .panel.open { top: 10%; }
        
        /* HISTORY STYLES */
        .hist-item { background: #000; border: 1px solid #333; border-radius: 10px; padding: 12px; margin-bottom: 12px; }
        .hist-title { color: var(--primary); font-weight: bold; font-size: 0.9rem; margin-bottom: 8px; border-bottom: 1px solid #222; padding-bottom: 4px; display: flex; justify-content: space-between; }
        .hist-set { font-size: 0.85rem; display: flex; align-items: center; padding: 4px 0; border-bottom: 1px solid #111; }
        .hist-set-num { width: 50px; opacity: 0.5; }
        .hist-set-data { flex-grow: 1; }
        .star-pr { color: var(--gold); font-weight: bold; margin-left: 10px; }
        
        /* DASHBOARD STYLES */
        .total-banner { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .total-box { background: #000; border: 1px solid #333; padding: 15px; border-radius: 12px; text-align: center; }
        .achieve-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .achieve-card { background: #2c2c2e; padding: 12px; border-radius: 12px; text-align: center; border: 1px solid #444; }
        .achieve-val { font-size: 1.3rem; font-weight: bold; color: var(--gold); display: block; }
        .achieve-label { font-size: 0.6rem; color: #8e8e93; text-transform: uppercase; margin-top: 4px; display: block; }
        .ratio-tag { font-size: 0.7rem; color: var(--accent); font-weight: bold; margin-top: 2px; display: block; }
        .heatmap { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin: 10px 0; }
        .heat-cell { aspect-ratio: 1; background: #333; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; color: #555; }
        .heat-active { background: var(--accent); color: black; font-weight: bold; }
        .remove-card { position: absolute; right: 10px; top: 10px; color: #ff453a; font-weight: bold; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-container">
        <h1 id="main-title" class="main-title">THE IRON SCRIPT</h1>
        <p id="auth-subtitle" style="color: #8e8e93; margin-bottom: 30px; font-size: 0.8rem; letter-spacing: 2px;">STRENGTH ARCHIVE</p>
        <input type="email" id="auth-email" class="auth-input" placeholder="Email Address">
        <input type="password" id="auth-pass" class="auth-input" placeholder="Password">
        <input type="password" id="auth-confirm" class="auth-input signup-only" placeholder="Confirm Password">
        <button id="main-auth-btn" class="auth-btn" onclick="submitAuth()">LOGIN</button>
        <button id="toggle-auth-btn" class="auth-secondary" onclick="toggleAuthMode()">New Athlete? Create Profile</button>
        <p id="auth-msg" style="color: #ff453a; font-size: 0.8rem; margin-top: 20px;"></p>
    </div>
</div>

<div id="app-content" style="display: none;">
    <div class="header">
        <div class="header-top">
            <div id="workout-label" style="font-size: 1.2rem; color: var(--accent); font-weight: bold;"></div>
            <button class="logout-btn" onclick="confirmLogout()">LOGOUT</button>
        </div>
        <div class="top-stats">
            <div class="stat-box"><span class="stat-label">Date</span><input type="date" id="date-picker"></div>
            <div class="stat-box"><span class="stat-label">Weight</span><input type="number" id="body-weight" placeholder="Lbs"></div>
            <div class="stat-box"><span class="stat-label">7D Avg</span><div id="weight-avg" style="color: var(--accent); font-weight: bold; padding: 10px; background: var(--input-bg); border-radius: 8px; text-align: center;">--</div></div>
        </div>
    </div>

    <div id="exercise-list" style="margin-top: 20px;"></div>
    <button class="btn-add-ex" onclick="addExercise()">+ Add Lifting</button>
    <button class="btn-add-ex" style="color: var(--cardio); border-color: var(--cardio);" onclick="addCardio()">+ Add Cardio</button>

    <div id="achieve-panel" class="panel">
        <span style="color: var(--gold); font-weight: bold; float: right;" onclick="closePanels()">CLOSE</span>
        <h2 style="color: var(--gold); margin: 0 0 15px 0;">Elite Dashboard</h2>
        
        <div style="background: #000; padding: 12px; border-radius: 10px; border: 1px solid #444; margin-bottom: 20px;">
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px;">
                <div style="text-align:center"><span class="stat-label">1RM</span><input type="number" id="calc-max" style="text-align:center; color:var(--gold)"></div>
                <div style="text-align:center"><span class="stat-label">Weight</span><input type="number" id="calc-weight" style="text-align:center"></div>
                <div style="text-align:center"><span class="stat-label">Reps</span><input type="number" id="calc-reps" style="text-align:center"></div>
            </div>
            <button onclick="calculateMissing()" style="background:var(--gold); color:black; border:none; padding:10px; border-radius:8px; width:100%; font-weight:bold;">CALCULATE</button>
        </div>

        <div class="total-banner">
            <div class="total-box"><span id="cardio-count" class="achieve-val" style="color: var(--cardio);">0</span><span class="achieve-label">Sessions</span></div>
            <div class="total-box"><span id="year-cals" class="achieve-val" style="color: #ff453a;">0</span><span class="achieve-label">Yearly Calories</span></div>
        </div>

        <div class="heatmap" id="heatmap"></div>

        <div class="achieve-grid">
            <div class="achieve-card"><span id="pb-bench" class="achieve-val">--</span><span id="ratio-bench" class="ratio-tag">--</span><span class="achieve-label">Bench</span></div>
            <div class="achieve-card"><span id="pb-dead" class="achieve-val">--</span><span id="ratio-dead" class="ratio-tag">--</span><span class="achieve-label">Deadlift</span></div>
            <div class="achieve-card"><span id="pb-incline" class="achieve-val">--</span><span id="ratio-incline" class="ratio-tag">--</span><span class="achieve-label">Incline</span></div>
            <div class="achieve-card"><span id="pb-squat" class="achieve-val">--</span><span id="ratio-squat" class="ratio-tag">--</span><span class="achieve-label">Squat</span></div>
        </div>

        <div class="achieve-card" style="width:100%; display:grid; grid-template-columns:repeat(3, 1fr); gap: 5px;">
            <div><span id="stat-miles" class="achieve-val" style="font-size: 0.9rem;">0</span><span class="achieve-label">Miles</span></div>
            <div><span id="stat-days" class="achieve-val" style="font-size: 0.9rem;">0</span><span class="achieve-label">Days</span></div>
            <div><span id="stat-volume" class="achieve-val" style="font-size: 0.9rem; color: var(--accent);">0</span><span class="achieve-label">Volume</span></div>
        </div>
    </div>

    <div id="history-panel" class="panel">
        <span style="color: var(--primary); font-weight: bold; float: right;" onclick="closePanels()">CLOSE</span>
        <h2 style="color: var(--primary); margin: 0 0 10px 0;">History</h2>
        <input type="date" id="history-calendar" style="background:var(--primary); color:white; padding:10px; border-radius:8px; width:100%; border:none; margin-bottom:15px;" onchange="loadSpecificDay()">
        <div id="history-content"></div>
    </div>

    <div class="save-footer">
        <button onclick="toggleHistory()" style="background:#333; color:white; border:none; border-radius:10px; font-weight:bold;">HISTORY</button>
        <button onclick="toggleAchieve()" style="background:var(--gold); color:black; border:none; border-radius:10px; font-weight:bold;">STATS</button>
        <button id="save-btn" onclick="saveWorkout()" style="background:var(--accent); color:black; border:none; border-radius:10px; font-weight:bold;">SAVE ALL</button>
    </div>
</div>

<script>
    const url = "https://script.google.com/macros/s/AKfycbwaX2g9cxOO9HAoZNuNOedCh9ZW5GqFkNwtfx9_JdVwTYZYQce3F2v1tnRwwo4ExDBM/exec"; 
    let isSignupMode = false;
    let USER_ID = localStorage.getItem('gym_user_email');
    let fullHistoryData = [];

    document.getElementById('date-picker').addEventListener('change', updateUI);

    if (USER_ID) {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app-content').style.display = 'block';
        init();
    }

    function toggleAuthMode() {
        isSignupMode = !isSignupMode;
        document.getElementById('main-title').innerText = isSignupMode ? "CREATE ATHLETE PROFILE" : "THE IRON SCRIPT";
        document.getElementById('main-auth-btn').innerText = isSignupMode ? "REGISTER" : "LOGIN";
        document.getElementById('toggle-auth-btn').innerText = isSignupMode ? "Already an Athlete? Login" : "New Athlete? Create Profile";
        document.querySelectorAll('.signup-only').forEach(el => el.style.display = isSignupMode ? 'block' : 'none');
    }

    async function submitAuth() {
        const email = document.getElementById('auth-email').value;
        const pass = document.getElementById('auth-pass').value;
        const confirm = document.getElementById('auth-confirm').value;
        const msg = document.getElementById('auth-msg');
        if (isSignupMode && pass !== confirm) { msg.innerText = "Passwords don't match"; return; }
        msg.innerText = "PROCESSING...";
        if (isSignupMode) {
            await fetch(url, {method: "POST", mode: "no-cors", body: JSON.stringify({action: "signup", email, password: pass})});
            msg.innerText = "Success! Log in now."; toggleAuthMode();
        } else {
            const res = await fetch(`${url}?action=login&email=${email}&password=${pass}`);
            const data = await res.json();
            if (data.success) { localStorage.setItem('gym_user_email', email); location.reload(); }
            else { msg.innerText = "ACCESS DENIED"; }
        }
    }

    function confirmLogout() {
        if (confirm("Are you sure you want to log out?")) {
            localStorage.removeItem('gym_user_email');
            location.reload();
        }
    }

    async function init() {
        document.getElementById('date-picker').value = new Date().toLocaleDateString('en-CA');
        updateUI();
        const res = await fetch(`${url}?userId=${USER_ID}`);
        const data = await res.json();
        fullHistoryData = data.history || [];
        calculateWeightAvg();
    }

    function updateUI() {
        const dateStr = document.getElementById('date-picker').value;
        if (!dateStr) return;
        const [year, month, day] = dateStr.split('-').map(Number);
        const d = new Date(year, month - 1, day);
        const days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
        document.getElementById('workout-label').innerText = days[d.getDay()];
    }

    function calculateWeightAvg() {
        const weights = fullHistoryData.map(h => parseFloat(h.bodyWeight)).filter(w => !isNaN(w));
        document.getElementById('weight-avg').innerText = weights.length ? (weights.reduce((a,b) => a+b, 0) / weights.length).toFixed(1) : "--";
    }

    function addExercise() {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `<div class="remove-card" onclick="this.parentElement.remove()">✕</div>
            <input type="text" class="ex-name" placeholder="Exercise Name" style="color:var(--primary); font-weight:bold;">
            <div class="set-cont"></div>
            <button onclick="addSet(this)" style="width:100%; background:#2c2c2e; color:var(--primary); border:none; padding:8px; border-radius:5px; margin-top:10px;">+ Set</button>`;
        document.getElementById('exercise-list').appendChild(div);
        addSet(div.querySelector('button'));
    }

    function addSet(btn) {
        const cont = btn.previousElementSibling;
        const row = document.createElement('div');
        row.className = 'set-row';
        row.innerHTML = `<div style="opacity:0.3">${cont.children.length+1}</div><input type="number" placeholder="Lbs"><input type="number" placeholder="Reps"><div onclick="this.parentElement.remove()">✕</div>`;
        cont.appendChild(row);
    }

    function addCardio() {
        const div = document.createElement('div');
        div.className = 'card cardio';
        div.innerHTML = `<div class="remove-card" onclick="this.parentElement.remove()">✕</div>
            <input type="text" class="c-type" placeholder="Cardio Type (Run, Row, etc)" style="color:var(--cardio); font-weight:bold;">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px;">
                <input type="text" class="c-dur" placeholder="Duration (min)">
                <input type="number" class="c-dist" placeholder="Distance (mi)">
                <input type="number" class="c-hr" placeholder="Avg Heart Rate">
                <input type="number" class="c-cal" placeholder="Calories">
            </div>
            <textarea class="c-notes" placeholder="Notes" style="margin-top:10px; height:60px;"></textarea>`;
        document.getElementById('exercise-list').appendChild(div);
    }

    async function saveWorkout() {
        const btn = document.getElementById('save-btn');
        btn.innerText = "SAVING...";
        const data = [];
        const date = document.getElementById('date-picker').value;
        const bw = document.getElementById('body-weight').value;

        // Strength Logic (A-M Mapping)
        document.querySelectorAll('.card:not(.cardio)').forEach(card => {
            const name = card.querySelector('.ex-name').value;
            card.querySelectorAll('.set-row').forEach((row, i) => {
                const ins = row.querySelectorAll('input');
                const weight = parseFloat(ins[0].value) || 0;
                const reps = parseFloat(ins[1].value) || 0;
                if(weight > 0) {
                    data.push({
                        date: date, 
                        exercise: name, 
                        set: i+1, 
                        weight: weight, 
                        reps: reps, 
                        duration: "", 
                        distance: "",
                        heartRate: "",
                        calories: "",
                        notes: "",
                        bodyWeight: bw,
                        volume: weight * reps
                    });
                }
            });
        });

        // Cardio Logic (A-M Mapping)
        document.querySelectorAll('.cardio').forEach(card => {
            data.push({
                date: date, 
                exercise: "CARDIO: " + card.querySelector('.c-type').value, 
                set: "", 
                weight: "", 
                reps: "", 
                duration: card.querySelector('.c-dur').value,
                distance: card.querySelector('.c-dist').value, 
                heartRate: card.querySelector('.c-hr').value,
                calories: card.querySelector('.c-cal').value, 
                notes: card.querySelector('.c-notes').value,
                bodyWeight: bw,
                volume: "" 
            });
        });

        await fetch(url, {method: "POST", mode: "no-cors", body: JSON.stringify({user: USER_ID, data: data})});
        btn.innerText = "SAVED!";
        setTimeout(() => { btn.innerText = "SAVE ALL"; init(); }, 1500);
    }

    function toggleAchieve() {
        closePanels();
        document.getElementById('achieve-panel').classList.add('open');
        let miles = 0, vol = 0, cals = 0, sessions = 0, dates = new Set();
        let maxes = { bench: 0, dead: 0, incline: 0, squat: 0 };
        const bw = parseFloat(document.getElementById('body-weight').value) || 180;

        fullHistoryData.forEach(h => {
            if(h.date) dates.add(h.date.split('T')[0]);
            if(h.weight && h.reps) {
                let epley = parseFloat(h.weight) * (1 + parseFloat(h.reps) / 30);
                vol += (parseFloat(h.weight) * parseFloat(h.reps));
                let ex = h.exercise.toLowerCase();
                if(ex.includes("bench")) maxes.bench = Math.max(maxes.bench, epley);
                if(ex.includes("deadlift")) maxes.dead = Math.max(maxes.dead, epley);
                if(ex.includes("incline")) maxes.incline = Math.max(maxes.incline, epley);
                if(ex.includes("squat")) maxes.squat = Math.max(maxes.squat, epley);
            }
            if(h.exercise && h.exercise.includes("CARDIO")) { sessions++; cals += parseFloat(h.calories || 0); miles += parseFloat(h.distance || 0); }
        });

        document.getElementById('stat-miles').innerText = miles.toFixed(1);
        document.getElementById('stat-volume').innerText = Math.round(vol/1000) + "k";
        document.getElementById('stat-days').innerText = dates.size;
        document.getElementById('cardio-count').innerText = sessions;
        document.getElementById('year-cals').innerText = Math.round(cals);

        const updateMax = (id, ratioId, val) => {
            document.getElementById(id).innerText = val > 0 ? Math.round(val) : "--";
            document.getElementById(ratioId).innerText = val > 0 ? (val/bw).toFixed(2) + "x BW" : "--";
        };
        updateMax('pb-bench', 'ratio-bench', maxes.bench);
        updateMax('pb-dead', 'ratio-dead', maxes.dead);
        updateMax('pb-incline', 'ratio-incline', maxes.incline);
        updateMax('pb-squat', 'ratio-squat', maxes.squat);

        const hm = document.getElementById('heatmap'); hm.innerHTML = "";
        let start = new Date(); start.setDate(new Date().getDate() - 34);
        for(let i=0; i<35; i++) {
            let d = new Date(start); d.setDate(start.getDate() + i);
            let act = [...dates].some(s => s.startsWith(d.toLocaleDateString('en-CA')));
            hm.innerHTML += `<div class="heat-cell ${act?'heat-active':''}">${d.getDate()}</div>`;
        }
    }

    function calculateMissing() {
        let mx = document.getElementById('calc-max'), w = document.getElementById('calc-weight'), r = document.getElementById('calc-reps');
        if (!mx.value) mx.value = Math.round(w.value * (1 + r.value / 30));
        else if (!w.value) w.value = Math.round(mx.value / (1 + r.value / 30));
    }

    function toggleHistory() { closePanels(); document.getElementById('history-panel').classList.add('open'); loadSpecificDay(); }
    
    function loadSpecificDay() {
        const sel = document.getElementById('history-calendar').value || document.getElementById('date-picker').value;
        const filtered = fullHistoryData.filter(h => h.date && h.date.startsWith(sel));
        const cont = document.getElementById('history-content');
        cont.innerHTML = "";

        if (filtered.length === 0) { cont.innerHTML = "No logs for this date."; return; }

        const grouped = filtered.reduce((acc, curr) => {
            if (!acc[curr.exercise]) acc[curr.exercise] = [];
            acc[curr.exercise].push(curr);
            return acc;
        }, {});

        for (const [exName, sets] of Object.entries(grouped)) {
            let max1RM = 0, prIndex = -1;
            sets.forEach((s, i) => {
                if (s.weight && s.reps) {
                    let epley = parseFloat(s.weight) * (1 + parseFloat(s.reps) / 30);
                    if (epley > max1RM) { max1RM = epley; prIndex = i; }
                }
            });

            const item = document.createElement('div');
            item.className = 'hist-item';
            let setHtml = `<div class="hist-title"><span>${exName}</span></div>`;
            
            sets.forEach((s, i) => {
                if (s.exercise.includes("CARDIO")) {
                    setHtml += `<div class="hist-set">
                        <div class="hist-set-data">${s.duration ? s.duration+'m | ' : ''}${s.distance || 0}mi | ${s.calories || 0}cal</div>
                        ${s.notes ? '<div style="font-size:0.7rem; opacity:0.6; margin-top:2px;">'+s.notes+'</div>' : ''}
                    </div>`;
                } else {
                    setHtml += `<div class="hist-set">
                        <div class="hist-set-num">Set ${i+1}</div>
                        <div class="hist-set-data">${s.weight} lbs x ${s.reps} ${i === prIndex ? '<span class="star-pr">⭐</span>' : ''}</div>
                    </div>`;
                }
            });
            item.innerHTML = setHtml;
            cont.appendChild(item);
        }
    }
    function closePanels() { document.querySelectorAll('.panel').forEach(p => p.classList.remove('open')); }
</script>
</body>
</html>
